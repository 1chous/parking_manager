openapi: 3.0.3
info:
  title: Parking Manager API
  description: |
    API для городской автоматизированной системы контроля парковок.
    Позволяет регистрировать парковочные зоны (включая загрузку карт-схем их расположения),
    открывать и закрывать парковочные сессии транспортных средств и вычислять статистику загрузки и сборов.
  version: 1.0.0
  contact:
    name: AutoTech Dev Team
    email: support@parking.example.com

servers:
  - url: http://localhost:8080/api/v1
    description: Локальный сервер разработки

tags:
  - name: Zones
    description: Управление парковочными зонами
  - name: Sessions
    description: Управление парковочными сессиями автомобилей
  - name: Analytics
    description: Анализ заполняемости и финансовый аудит парковок

paths:
  /zones:
    post:
      tags:
        - Zones
      summary: Создать новую парковочную зону
      description: Добавляет текстовое описание зоны без схемы. Карта-схема загружается на следующем этапе.
      operationId: createZone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParkingZoneCreate'
      responses:
        '201':
          description: Парковочная зона успешно создана.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingZoneIdResponse'
        '400':
          description: Ошибка валидации параметров запроса.

    get:
      tags:
        - Zones
      summary: Получить список всех парковочных зон
      description: Возвращает список всех зарегистрированных зон парковки.
      operationId: getAllZones
      responses:
        '200':
          description: Список парковочных зон получен.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParkingZone'

  /zones/{zone_id}:
    get:
      tags:
        - Zones
      summary: Получить подробную информацию о парковочной зоне
      description: Возвращает карточку конкретной зоны по ее ID.
      operationId: getZoneById
      parameters:
        - $ref: '#/components/parameters/ZoneId'
      responses:
        '200':
          description: Информация о зоне успешно получена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingZone'
        '404':
          description: Зона парковки не найдена.

    put:
      tags:
        - Zones
      summary: Изменить параметры парковочной зоны
      description: Позволяет скорректировать вместимость или тариф выбранной зоны.
      operationId: updateZone
      parameters:
        - $ref: '#/components/parameters/ZoneId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParkingZoneCreate'
      responses:
        '200':
          description: Параметры зоны успешно обновлены.
        '404':
          description: Зона парковки не найдена.

    delete:
      tags:
        - Zones
      summary: Удалить парковочную зону
      description: Удаляет зону парковки. Если в ней есть сессии, может сработать ограничение внешнего ключа.
      operationId: deleteZone
      parameters:
        - $ref: '#/components/parameters/ZoneId'
      responses:
        '204':
          description: Парковочная зона успешно удалена.
        '404':
          description: Зона не найдена.

  /zones/{zone_id}/image:
    put:
      tags:
        - Zones
      summary: Загрузить карту-схему парковочной зоны
      description: Сохраняет план расположения машиномест или схему въезда в зону на сервере.
      operationId: uploadZoneImage
      parameters:
        - $ref: '#/components/parameters/ZoneId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Файл схемы парковочной зоны (JPEG или PNG)
      responses:
        '200':
          description: Карта-схема успешно загружена.
        '404':
          description: Зона парковки не найдена.

    get:
      tags:
        - Zones
      summary: Получить карту-схему парковочной зоны
      description: Возвращает файл изображения схемы с соответствующим Content-Type заголовком.
      operationId: getZoneImage
      parameters:
        - $ref: '#/components/parameters/ZoneId'
      responses:
        '200':
          description: Карта-схема получена.
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '404':
          description: Схема не найдена.

  /zones/{zone_id}/sessions:
    get:
      tags:
        - Zones
      summary: Получить список всех парковочных сессий зоны
      description: Возвращает перечень сессий для выбранной зоны за все время.
      operationId: getSessionsByZone
      parameters:
        - $ref: '#/components/parameters/ZoneId'
      responses:
        '200':
          description: Список сессий успешно получен.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParkingSession'
        '404':
          description: Зона не найдена.

  /sessions:
    post:
      tags:
        - Sessions
      summary: Начать новую парковочную сессию
      description: Фиксирует заезд автомобиля в выбранную парковочную зону.
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParkingSessionCreate'
      responses:
        '201':
          description: Парковочная сессия успешно зарегистрирована.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSessionIdResponse'
        '400':
          description: Некорректные параметры или неверный zone_id.

  /sessions/{session_id}:
    get:
      tags:
        - Sessions
      summary: Получить данные парковочной сессии
      description: Возвращает карточку конкретной стоянки автомобиля.
      operationId: getSessionById
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Данные сессии успешно получены.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSession'
        '404':
          description: Парковочная сессия не найдена.

    put:
      tags:
        - Sessions
      summary: Обновить параметры парковочной сессии
      description: Позволяет проставить время выезда автомобиля, номерной знак или изменить статус оплаты.
      operationId: updateSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParkingSessionCreate'
      responses:
        '200':
          description: Данные сессии успешно обновлены.
        '404':
          description: Парковочная сессия не найдена.

    delete:
      tags:
        - Sessions
      summary: Удалить запись парковочной сессии
      description: Удаляет запись о пребывании автомобиля из истории парковочной зоны.
      operationId: deleteSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: Сессия успешно удалена.
        '404':
          description: Запись не найдена.

  /analytics/summary:
    get:
      tags:
        - Analytics
      summary: Получить отчет загруженности и доходности парковок
      description: Тяжелый аналитический запрос, агрегирующий парковочные сессии по часам и вычисляющий загруженность зон и доход.
      operationId: getAnalyticsSummary
      responses:
        '200':
          description: Аналитический отчет успешно сформирован.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ZoneAnalytics'

components:
  parameters:
    ZoneId:
      name: zone_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ParkingZoneCreate:
      type: object
      required:
        - name
        - capacity
        - price_per_hour
      properties:
        name:
          type: string
          example: "Парковка Терминал А"
        capacity:
          type: integer
          minimum: 1
          example: 250
        price_per_hour:
          type: number
          minimum: 0
          example: 150.00

    ParkingZoneIdResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "7e1b21a0-6d8c-4f9e-8a1a-3e2f4b0e8c7d"

    ParkingZone:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "7e1b21a0-6d8c-4f9e-8a1a-3e2f4b0e8c7d"
        name:
          type: string
          example: "Парковка Терминал А"
        capacity:
          type: integer
          example: 250
        price_per_hour:
          type: number
          example: 150.00
        image_url:
          type: string
          example: "/api/v1/zones/7e1b21a0-6d8c-4f9e-8a1a-3e2f4b0e8c7d/image"

    ParkingSessionCreate:
      type: object
      required:
        - zone_id
        - license_plate
        - entry_time
        - is_paid
      properties:
        zone_id:
          type: string
          format: uuid
          example: "7e1b21a0-6d8c-4f9e-8a1a-3e2f4b0e8c7d"
        license_plate:
          type: string
          pattern: "^[А-Яа-яA-Za-z0-9\\s-]{6,15}$"
          example: "А123ВВ777"
        entry_time:
          type: string
          format: date-time
          example: "2026-10-15T14:00:00Z"
        exit_time:
          type: string
          format: date-time
          nullable: true
          example: "2026-10-15T16:30:00Z"
        is_paid:
          type: boolean
          example: true

    ParkingSessionIdResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "f8d3d920-56ef-46c9-a9a3-5c76503c14ff"

    ParkingSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "f8d3d920-56ef-46c9-a9a3-5c76503c14ff"
        zone_id:
          type: string
          format: uuid
          example: "7e1b21a0-6d8c-4f9e-8a1a-3e2f4b0e8c7d"
        license_plate:
          type: string
          example: "А123ВВ777"
        entry_time:
          type: string
          format: date-time
          example: "2026-10-15T14:00:00Z"
        exit_time:
          type: string
          format: date-time
          nullable: true
          example: "2026-10-15T16:30:00Z"
        is_paid:
          type: boolean
          example: true

    ZoneAnalytics:
      type: object
      properties:
        zone_id:
          type: string
          format: uuid
          example: "7e1b21a0-6d8c-4f9e-8a1a-3e2f4b0e8c7d"
        zone_name:
          type: string
          example: "Парковка Терминал А"
        total_sessions:
          type: integer
          example: 1450
        average_occupancy_percentage:
          type: number
          example: 68.5
        average_duration_minutes:
          type: number
          example: 145.0
        total_revenue:
          type: number
          example: 326250.00